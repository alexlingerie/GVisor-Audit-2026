name: C/C++ CI

on:
  push:
    branches: [ "main" ]

jobs:
  audit-run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configurar Entorno
      run: sudo apt-get update && sudo apt-get install -p build-essential python3 -y

    - name: Ejecutar Auditoría de Recursos (FD Exhaustion)
      run: make stress_test

    - name: Validar Parche de Seguridad (Mojo Stack Fix)
      run: make verify_patch
