name: ARCH-PROT-2025 Audit CI

on:
  push:
    branches: [ "main" ]

jobs:
  audit-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Configurar Entorno
      run: sudo apt-get update && sudo apt-get install -y build-essential python3

    - name: System Baseline (Vector-Y)
      run: |
        ulimit -n
        if [ -f fd_pressure_test.py ]; then
          python3 fd_pressure_test.py || echo "Expected resource limit reached"
        fi

    - name: Execute ARCH-PROT-2025 (Vector-X)
      run: |
        MJS_FILE=$(ls *.mjs | head -n 1)
        if [ ! -z "$MJS_FILE" ]; then
          node $MJS_FILE
        else
          echo "No .mjs file found."
          exit 1
        fi
      env:
        CI: true

    - name: Audit Status Check
      run: |
        if [ -f EVIDENCE_APRIL_2026.log ]; then
          grep -q "BYPASS_CONFIRMED" EVIDENCE_APRIL_2026.log && echo "Audit verified." || echo "No signature found."
        else
          echo "Log missing."
        fi
