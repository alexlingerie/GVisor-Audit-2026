name: C/C++ CI Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Install Build Essentials
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: configure
      run: ./configure

    - name: make
      run: make

    - name: run audit
      run: ./audit_check --self-test
