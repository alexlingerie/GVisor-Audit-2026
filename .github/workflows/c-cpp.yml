name: ARCH-PROT-2025 Audit CI

on:
  push:
    branches: [ "main" ]

jobs:
  audit-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: System Baseline (Vector-Y)
      run: |
        ulimit -n
        # Verificamos si el archivo existe antes de correrlo
        if [ -f fd_pressure_test.py ]; then
          python3 fd_pressure_test.py || echo "Expected resource limit reached"
        else
          echo "fd_pressure_test.py not found, skipping baseline."
        fi

    - name: Execute ARCH-PROT-2025 (Vector-X)
      run: |
        # Buscamos cualquier archivo .mjs si el nombre exacto falla
        MJS_FILE=$(ls *.mjs | head -n 1)
        if [ ! -z "$MJS_FILE" ]; then
          node $MJS_FILE
        else
          echo "No .mjs file found for Vector-X."
          exit 1
        fi
      env:
        CI: true

    - name: Audit Status Check
      run: |
        if [ -f EVIDENCE_APRIL_2026.log ]; then
          if grep -q "BYPASS_CONFIRMED" EVIDENCE_APRIL_2026.log; then
            echo "Audit verified successfully."
          else
            echo "Warning: Evidence found but no bypass signature detected."
          fi
        else
          echo "Evidence log missing."
        fi
